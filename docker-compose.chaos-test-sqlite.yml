services:
  # PostgreSQL source database
  postgres:
    image: postgres:15-alpine
    container_name: cdc_postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test.123
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - ./examples/scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init_postgres.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=10
      -c max_wal_senders=10
      -c max_connections=500
    networks:
      - chaos_test_network

  cdc_app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DEST_FEATURES: sqlite,metrics
    container_name: cdc_application
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./env/.env.sqlite
    environment:
      RUST_LOG: info
      RUST_BACKTRACE: 1
      CDC_LAST_LSN_FILE: /app/data/pg2any_last_lsn.metadata
      CDC_TRANSACTION_FILE_BASE_PATH: /app/data
      CDC_STREAMING: "false"
    ports:
      - "8080:8080"
    restart: unless-stopped
    stop_grace_period: 300s
    stop_signal: SIGTERM
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - ./examples/scripts/init_sqlite.sql:/init/init_sqlite.sql:ro
      - ./tests/chaos/scenarios/verify_sqlite:/verify:ro
      - cdc_data:/app/data
    networks:
      - chaos_test_network

volumes:
  cdc_data:
    name: chaos_test_sqlite_data

networks:
  chaos_test_network:
    driver: bridge
    name: chaos_test_network
